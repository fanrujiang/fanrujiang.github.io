<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">DDL(Data Definition Language) 数据定义语言:(定义数据库对象)操作数据库，表等</span><br><span class="line">DML(Data Manipulation Language) 数据操作语言:对表中的数据进行增删改</span><br><span class="line">DQL(Data Query Language) 数据查询语言:对表中的记录(数据)进行查询</span><br><span class="line">DCL(Data Control Language) 数据控制语言:管理用户对数据库访问权限和安全级别进行控制</span><br></pre></td></tr></table></figure>
